<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>外出經費申請輔助系統（Offline v1.1 · Module 版）</title>
  <script src="./xlsx.full.min.js"></script>
  <script src="./app.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 14px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; vertical-align: top; }
    th { background-color: #f3f3f3; text-align: center; }
  </style>
</head>
<body>
<h2>外出經費申請輔助系統（Offline v1.1 · Module 版）</h2>
<input type="file" id="excelFile" accept=".xlsx">
<div style="margin-top:10px;">
  <button id="importEtagBtn">匯入 eTag 通行費明細（PDF）</button>
  <input type="file" id="etagFile" accept="application/pdf" style="display:none">
</div>
<table id="resultTable">
  <thead>
    <tr>
      <th>日期</th><th>起</th><th>迄</th><th>處理事項</th>
      <th>里程數</th><th>停車費</th><th>外出單號</th><th>Google 路線</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<script type="module" src="./etag_import_module.js"></script>
</body>
</html>
