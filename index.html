<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>外出經費申請輔助系統 V2.2 Stable</title>

  <style>
    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      padding: 16px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 12px;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: center;
    }
    th {
      background: #f3f3f3;
      white-space: nowrap;
    }
    td[contenteditable] {
      background: #fffbe6;
    }
    .toolbar {
      margin-top: 12px;
    }
    .toolbar button {
      margin-right: 8px;
      padding: 6px 12px;
    }
  </style>
</head>
<body>

<h2>外出經費申請輔助系統 V2.2 Stable</h2>

<div class="toolbar">
  <input type="file" id="excelFile" accept=".xlsx" />
  <button id="etagBtn">匯入 eTag PDF</button>
  <input type="file" id="etagFile" accept="application/pdf" style="display:none;">
</div>

<table id="resultTable">
  <thead>
    <tr>
      <th>日期</th>
      <th>起</th>
      <th>迄</th>
      <th>處理事項</th>
      <th>里程數</th>
      <th>交通工具</th>
      <th>停車費</th>
      <th>eTag</th>
      <th>高鐵</th>
      <th>總和</th>
      <th>外出單號</th>
      <th>路線</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- ✅ script 載入順序固定，缺一不可 -->
<script src="./xlsx.full.min.js"></script>
<script src="./app.js"></script>
<script src="./app_patch_pdf_init.js"></script>
<script src="./etag.js"></script>

</body>
</html>
